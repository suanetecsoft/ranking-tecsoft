<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranking TECSOFT 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --navy:#061D49; --cyan:#00B5E2; --purple:#2D2C65; --orange:#FD4B01;
  --bg:#F5F6FA; --surface:#FFFFFF; --border:#E4E7EF;
  --text:#0D1B35; --text-sub:#6B7A99;
  --gold:#EF9F27; --silver:#9DA8BA; --bronze:#CD7C5A;
  --green:#0F6E56; --green-bg:#E1F5EE;
  --radius:10px; --radius-sm:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:13px;min-height:100vh}
.header{background:var(--navy);color:white;padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.header-left{display:flex;align-items:center;gap:.75rem}
.logo-dot{width:10px;height:10px;border-radius:50%;background:var(--cyan)}
.header h1{font-size:15px;font-weight:600;color:white}
.header-year{font-size:12px;color:rgba(255,255,255,.5);font-family:'DM Mono',monospace}
.header-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn{padding:6px 14px;border-radius:var(--radius-sm);font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;font-weight:500;border:none;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-editor{background:rgba(255,255,255,.12);color:white;border:1px solid rgba(255,255,255,.2)}
.btn-editor.active{background:var(--orange);border-color:var(--orange)}
.btn-save{background:var(--cyan);color:var(--navy)}
.save-status{font-size:11px;color:rgba(255,255,255,.5);font-family:'DM Mono',monospace}
.tabs-wrap{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;gap:2px;overflow-x:auto}
.tab{padding:10px 14px;font-size:12px;font-weight:500;color:var(--text-sub);cursor:pointer;border:none;background:transparent;font-family:'DM Sans',sans-serif;border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s,border-color .15s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--navy);border-bottom-color:var(--cyan)}
.tab.done{color:var(--green)}
.tab.done.active{border-bottom-color:var(--green);color:var(--green)}
.tab-dash{color:var(--navy);font-weight:600}
.tab-dash.active{border-bottom-color:var(--navy)}
.tab-anual{color:var(--purple);font-weight:600}
.tab-anual.active{border-bottom-color:var(--purple);color:var(--purple)}
.main{padding:1.25rem 1.5rem 3rem;max-width:1100px;margin:0 auto}
.section-lbl{font-size:10px;font-weight:600;color:var(--text-sub);letter-spacing:.08em;text-transform:uppercase;margin:1.25rem 0 .6rem}
.podium{display:flex;align-items:flex-end;justify-content:center;gap:16px;margin:.75rem 0 1.5rem}
.pod-item{display:flex;flex-direction:column;align-items:center;gap:5px}
.pod-name{font-size:12px;font-weight:600;color:var(--text);text-align:center;max-width:90px;line-height:1.3}
.pod-setor{font-size:10px;color:var(--text-sub);text-align:center}
.pod-pts{font-size:12px;font-weight:500}
.pod-block{width:72px;border-radius:6px 6px 0 0;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700}
.pos1 .pod-block{height:76px;background:var(--gold);color:#7a4800}.pos1 .pod-pts{color:#a05e00}
.pos2 .pod-block{height:54px;background:var(--silver);color:#3d4a5c}.pos2 .pod-pts{color:#4a5568}
.pos3 .pod-block{height:38px;background:var(--bronze);color:#6b3520}.pos3 .pod-pts{color:#7a3d22}
.table-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface)}
table{width:100%;border-collapse:collapse}
thead tr{background:#F8F9FC}
th{font-size:10px;font-weight:600;color:var(--text-sub);padding:8px 10px;text-align:left;letter-spacing:.04em;text-transform:uppercase;border-bottom:1px solid var(--border)}
th.r{text-align:right}
td{padding:5px 10px;border-bottom:1px solid #F0F2F8;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#FAFBFF}
td.name-col{font-weight:500;color:var(--text)}
td.r{text-align:right;color:var(--text-sub);font-family:'DM Mono',monospace;font-size:12px}
td.sub-col{text-align:right;font-weight:600;color:var(--text);font-family:'DM Mono',monospace;font-size:13px}
td.anual-col{text-align:right;font-weight:700;color:var(--navy);font-family:'DM Mono',monospace;font-size:14px}
input[type=number]{width:52px;padding:4px 6px;border:1px solid var(--border);border-radius:var(--radius-sm);background:#F8F9FC;color:var(--text);font-size:12px;text-align:center;font-family:'DM Mono',monospace}
input[type=number]:focus{outline:none;border-color:var(--cyan);background:white}
input[type=number]:disabled{opacity:.4;cursor:not-allowed;background:var(--bg)}
.pos-badge{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;font-size:10px;font-weight:600;background:var(--bg);color:var(--text-sub);font-family:'DM Mono',monospace}
.badge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:20px;font-weight:500}
.bonus-chip{display:inline-block;font-size:11px;padding:2px 7px;border-radius:20px;background:#FEF3E2;color:#a05e00;font-weight:600;font-family:'DM Mono',monospace}
.done-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--green);background:var(--green-bg);padding:5px 12px;border-radius:20px;font-weight:500}
.btn-concluir{margin-top:1.25rem;padding:9px 20px;border-radius:var(--radius-sm);border:1.5px solid var(--navy);background:transparent;color:var(--navy);font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;font-weight:500;transition:background .15s,color .15s}
.btn-concluir:hover{background:var(--navy);color:white}
.btn-editar{padding:5px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;color:var(--text-sub);font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .15s}
.btn-editar:hover{border-color:var(--orange);color:var(--orange);background:#FFF5F0}
.modal-overlay{position:fixed;inset:0;background:rgba(6,29,73,.45);display:flex;align-items:center;justify-content:center;z-index:100;padding:1rem}
.modal{background:white;border-radius:14px;padding:1.75rem;max-width:400px;width:100%;box-shadow:0 20px 60px rgba(6,29,73,.18)}
.modal h3{font-size:16px;font-weight:600;color:var(--navy);margin-bottom:.25rem}
.modal-sub{font-size:12px;color:var(--text-sub);margin-bottom:1.25rem}
.modal-row{display:flex;align-items:center;gap:10px;margin-bottom:.75rem;padding:8px 10px;border-radius:var(--radius-sm);background:var(--bg)}
.modal-medal{font-size:20px;min-width:28px}
.modal-name{font-size:13px;font-weight:500;color:var(--text);flex:1}
.modal-pts{font-size:12px;color:var(--text-sub);font-family:'DM Mono',monospace}
.modal-bonus{font-size:12px;color:#a05e00;font-weight:600;background:#FEF3E2;padding:2px 8px;border-radius:20px;font-family:'DM Mono',monospace}
.modal-actions{display:flex;gap:8px;margin-top:1.25rem}
.btn-confirm{flex:1;padding:9px;border-radius:var(--radius-sm);border:none;background:var(--navy);color:white;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;font-weight:500}
.btn-cancel{flex:1;padding:9px;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer}
.login-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:1rem}
.login-box{background:white;border-radius:14px;padding:2rem;max-width:320px;width:100%;border:1px solid var(--border);text-align:center}
.login-box h3{font-size:15px;font-weight:600;color:var(--navy);margin-bottom:.5rem}
.login-box p{font-size:12px;color:var(--text-sub);margin-bottom:1.25rem}
.login-input{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:'DM Sans',sans-serif;margin-bottom:.75rem;outline:none}
.login-input:focus{border-color:var(--cyan)}
.login-err{font-size:12px;color:var(--orange);margin-top:.25rem}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-top:.5rem;align-items:start}
.dash-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem}
.dash-card.full{grid-column:1 / -1}
.dash-card-title{font-size:11px;font-weight:600;color:var(--text-sub);letter-spacing:.07em;text-transform:uppercase;margin-bottom:1rem}
.rank-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid #F0F2F8}
.rank-row:last-child{border-bottom:none}
.rank-num{font-size:11px;font-weight:600;color:var(--text-sub);font-family:'DM Mono',monospace;min-width:20px;text-align:right}
.rank-name{flex:1;font-size:13px;font-weight:500;color:var(--text)}
.rank-bar-wrap{width:100px;height:5px;background:#EEF0F7;border-radius:3px;overflow:hidden}
.rank-bar{height:100%;border-radius:3px}
.rank-pts{font-size:12px;font-weight:600;color:var(--navy);font-family:'DM Mono',monospace;min-width:32px;text-align:right}
.ver-todos-btn{width:100%;margin-top:.75rem;padding:7px;border-radius:var(--radius-sm);border:1px dashed var(--border);background:transparent;color:var(--text-sub);font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .15s}
.ver-todos-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.mes-select{font-size:12px;font-family:'DM Sans',sans-serif;padding:5px 8px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);cursor:pointer}
.dash-empty{font-size:12px;color:var(--text-sub);text-align:center;padding:1.5rem;background:var(--bg);border-radius:var(--radius-sm)}
.loading-overlay{position:fixed;inset:0;background:rgba(6,29,73,.6);display:flex;align-items:center;justify-content:center;z-index:200}
.loading-box{background:white;border-radius:12px;padding:1.5rem 2rem;text-align:center;font-size:14px;color:var(--navy);font-weight:500}
.loading-spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--cyan);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto .75rem}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:700px){.dash-grid{grid-template-columns:1fr}.dash-card.full{grid-column:1}}
</style>
</head>
<body>

</div>

<div class="main" id="content"></div>
<div id="modal-container"></div>

<script>
// ---- CONFIG SUPABASE ----
var SUPABASE_URL = 'https://ncknveoehjcbupyywxqg.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5ja252ZW9laGpjYnVweXl3eHFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1Mjk5MTYsImV4cCI6MjA5NDEwNTkxNn0.CCX6vGozJeQQ_6s1dESDebV2RQseFhhZ8CT2Hi4nuTM';
var EDITOR_PASS = 'Su@Ne105105#';

// ---- CONSTANTES ----
var MESES = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
var LABEL = {jan:'Janeiro',fev:'Fevereiro',mar:'Março',abr:'Abril',mai:'Maio',jun:'Junho',jul:'Julho',ago:'Agosto',set:'Setembro',out:'Outubro',nov:'Novembro',dez:'Dezembro'};
var PESSOAS = [
  {n:'Ana Flavia',s:'Limpeza'},{n:'Emanoel Pereira',s:'Dev'},{n:'Felipe Fernando',s:'Suporte'},
  {n:'Felipe Santos',s:'Dev'},{n:'Fernanda Barca',s:'Adm/RH'},{n:'Giovanni Dantas',s:'Suporte'},
  {n:'Gustavo Borba',s:'Dev'},{n:'Gute Arcanjo',s:'Comercial'},{n:'Harley Ribeiro',s:'Dev'},
  {n:'Hugo Stefano',s:'Dev'},{n:'Ian Foss',s:'Dev'},{n:'Iberê Serafim',s:'Limpeza'},
  {n:'Ingrid Gurgel',s:'Marketing'},{n:'Jefferson Araújo',s:'Comercial'},{n:'Josenilson Silva',s:'Suporte'},
  {n:'Júlia Varela',s:'Adm/RH'},{n:'Kézia Freire',s:'Comercial'},{n:'Luã Ferreira',s:'Suporte'},
  {n:'Lucas Gomes',s:'Suporte'},{n:'Marcos Costa',s:'Suporte'},{n:'Marcos Vinicius',s:'Marketing'},
  {n:'Paulo Policarpo',s:'Dev'},{n:'Paulo Sérgio',s:'Dev'},{n:'Patrício Oliveira',s:'Dev'},
  {n:'Ricardo Santiago',s:'Dev'},{n:'Roberto Santiago',s:'Suporte'}
];
var COR = {Dev:'#12a594',Suporte:'#04A9F4',Comercial:'#c9a800','Adm/RH':'#ff7800',Marketing:'#bf55ec',Limpeza:'#e8659a'};
var LINHA_CORES = ['#00B5E2','#FD4B01','#2D2C65','#0F6E56','#EF9F27','#e84393','#12a594','#9333ea','#dc2626','#2563eb','#ca8a04','#16a34a','#db2777','#7c3aed','#0891b2','#c2410c','#4338ca','#047857','#b45309','#0369a1','#7c2d12','#166534','#581c87','#9f1239','#065f46','#1e3a5f'];

var data = {};
var currentTab = 'dashboard';
var isEditor = false;
var barMesSelecionado = null;
var barChartInstance = null;
var evChartInstance = null;
var saveTimer = null;

// ---- SUPABASE ----
function supaFetch(method, body) {
  return fetch(SUPABASE_URL + '/rest/v1/ranking_data?id=eq.main', {
    method: method,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': method === 'PATCH' ? 'return=minimal' : 'return=representation'
    },
    body: body ? JSON.stringify(body) : undefined
  });
}

function showLoading(msg) {
  document.getElementById('modal-container').innerHTML =
    '<div class="loading-overlay"><div class="loading-box">'+
    '<div class="loading-spinner"></div>'+
    (msg||'Carregando...')+
    '</div></div>';
}

function hideLoading() {
  var el = document.getElementById('modal-container');
  if (el) el.innerHTML = '';
}

async function loadFromSupabase() {
  showLoading('Carregando dados...');
  try {
    var res = await supaFetch('GET');
    var json = await res.json();
    if (json && json[0] && json[0].data) {
      data = json[0].data;
    }
  } catch(e) {
    console.error('Erro ao carregar:', e);
  }
  initData();
  hideLoading();
  updateAllTabs();
  show('dashboard');
}

async function saveToSupabase() {
  setStatus('Salvando...');
  try {
    await supaFetch('PATCH', {data: data, updated_at: new Date().toISOString()});
    setStatus('✓ Salvo');
    setTimeout(function(){ setStatus(''); }, 2000);
  } catch(e) {
    setStatus('Erro ao salvar');
  }
}

function schedSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveToSupabase, 1200);
}

function setStatus(msg) {
  var el = document.getElementById('save-status');
  if (el) el.textContent = msg;
}

// ---- EDITOR ----
function toggleEditor() {
  if (isEditor) {
    isEditor = false;
    var btn = document.getElementById('btn-editor');
    btn.textContent = '🔒 Modo editor';
    btn.classList.remove('active');
    show(currentTab);
    return;
  }
  document.getElementById('modal-container').innerHTML =
    '<div class="modal-overlay">'+
    '<div class="modal">'+
    '<h3>Acesso restrito</h3>'+
    '<div class="modal-sub">Digite a senha para editar o ranking.</div>'+
    '<input class="login-input" type="password" id="editor-pass" placeholder="Senha" onkeydown="if(event.key===\'Enter\')checkPass()">'+
    '<div class="login-err" id="login-err"></div>'+
    '<div class="modal-actions" style="margin-top:1rem">'+
    '<button class="btn-cancel" onclick="hideLoading()">Cancelar</button>'+
    '<button class="btn-confirm" onclick="checkPass()">Entrar</button>'+
    '</div></div></div>';
  setTimeout(function(){ var el=document.getElementById('editor-pass'); if(el) el.focus(); }, 100);
}

function checkPass() {
  var val = document.getElementById('editor-pass').value;
  if (val === EDITOR_PASS) {
    isEditor = true;
    hideLoading();
    var btn = document.getElementById('btn-editor');
    btn.textContent = '✏️ Editor ativo';
    btn.classList.add('active');
    show(currentTab);
  } else {
    document.getElementById('login-err').textContent = 'Senha incorreta.';
  }
}

// ---- DADOS ----
function emptyMonth() {
  var rows = {};
  for (var i = 0; i < PESSOAS.length; i++) rows[i] = {peers:0,ger:0,pont:0};
  return {rows:rows, done:false, bonus:{}};
}

function initData() {
  for (var mi = 0; mi < MESES.length; mi++) {
    var m = MESES[mi];
    if (!data[m]) data[m] = emptyMonth();
    if (!data[m].bonus) data[m].bonus = {};
    for (var i = 0; i < PESSOAS.length; i++) {
      if (!data[m].rows[i]) data[m].rows[i] = {peers:0,ger:0,pont:0};
    }
  }
}

// ---- CÁLCULO ----
function calcSub(mes, i) {
  var r = data[mes] && data[mes].rows && data[mes].rows[i];
  if (!r) return 0;
  return (r.peers||0)+(r.ger||0)+(r.pont||0);
}
function getBonus(mes, i) { return (data[mes]&&data[mes].bonus&&data[mes].bonus[i])||0; }
function calcAnual(i) {
  var t=0;
  for (var mi=0;mi<MESES.length;mi++) t+=calcSub(MESES[mi],i)+getBonus(MESES[mi],i);
  return t;
}
function getSortedSub(mes) {
  var arr=[];
  for (var i=0;i<PESSOAS.length;i++) arr.push({i:i,n:PESSOAS[i].n,sub:calcSub(mes,i)});
  arr.sort(function(a,b){return b.sub-a.sub;});
  return arr;
}
function getMesAtual() {
  for (var mi=MESES.length-1;mi>=0;mi--) {
    for (var i=0;i<PESSOAS.length;i++) { if(calcSub(MESES[mi],i)>0) return MESES[mi]; }
  }
  return MESES[0];
}

// ---- PÓDIO ----
function podiumHTML(mes) {
  var sorted=getSortedSub(mes).filter(function(p){return p.sub>0;});
  if (!sorted.length) return '<p style="color:var(--text-sub);font-size:12px;text-align:center;padding:1rem">Nenhum voto ainda.</p>';
  var order=sorted.length>=3?[sorted[1],sorted[0],sorted[2]]:sorted.length===2?[sorted[1],sorted[0]]:[sorted[0]];
  var cls=['pos2','pos1','pos3'], nums=[2,1,3];
  var html='<div class="podium">';
  for (var oi=0;oi<order.length;oi++) {
    var p=order[oi];
    html+='<div class="pod-item '+cls[oi]+'">'+
      '<div class="pod-name">'+p.n+'</div>'+
      '<div class="pod-setor">'+PESSOAS[p.i].s+'</div>'+
      '<div class="pod-pts">'+p.sub+' pts</div>'+
      '<div class="pod-block">'+nums[oi]+'</div></div>';
  }
  return html+'</div>';
}

// ---- UPDATE ROWS ----
function updateRows(mes) {
  var sorted=getSortedSub(mes);
  for (var i=0;i<PESSOAS.length;i++) {
    var sub=calcSub(mes,i);
    var elSub=document.getElementById(mes+'_sub_'+i);
    if(elSub) elSub.textContent=sub>0?sub:'–';
    var elPos=document.getElementById(mes+'_pos_'+i);
    if(elPos){
      var rank=-1;
      for(var k=0;k<sorted.length;k++){if(sorted[k].i===i){rank=k;break;}}
      elPos.textContent=sub>0?rank+1:'–';
    }
  }
  var pod=document.getElementById('pod_'+mes);
  if(pod) pod.innerHTML=podiumHTML(mes);
}

// ---- RENDER MÊS ----
function renderMes(mes) {
  var isDone=!!(data[mes]&&data[mes].done);
  var label=LABEL[mes];
  var html='';
  if (isDone) {
    var b=data[mes].bonus||{};
    var bonusList=[];
    var keys=Object.keys(b).sort(function(a,c){return b[c]-b[a];});
    for(var ki=0;ki<keys.length;ki++){if(b[keys[ki]]>0) bonusList.push(PESSOAS[parseInt(keys[ki])].n+' +'+b[keys[ki]]);}
    html+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:.75rem">'+
      '<div class="done-badge">✓ '+label+' concluído'+(bonusList.length?' — bônus: '+bonusList.join(' · '):'')+
      '</div>'+(isEditor?'<button class="btn-editar" onclick="reabrirMes(\''+mes+'\')">✏️ Editar mês</button>':'')+
      '</div>';
  }
  html+='<div class="section-lbl">Pódio — '+label+'</div><div id="pod_'+mes+'">'+podiumHTML(mes)+'</div>';
  html+='<div class="section-lbl">Contagem — '+label+'</div>';
  html+='<div class="table-wrap"><table><thead><tr>'+
    '<th style="width:32px">#</th><th>Colaborador</th>'+
    '<th class="r" style="width:80px">Colegas</th>'+
    '<th class="r" style="width:80px">Gerência</th>'+
    '<th class="r" style="width:90px">Pontualidade</th>'+
    '<th class="r" style="width:80px">Subtotal</th>'+
    '</tr></thead><tbody>';
  for (var i=0;i<PESSOAS.length;i++) {
    var p=PESSOAS[i], cor=COR[p.s]||'#888', r=data[mes].rows[i];
    var dis=(!isEditor||isDone)?'disabled':'';
    html+='<tr>'+
      '<td><span class="pos-badge" id="'+mes+'_pos_'+i+'">–</span></td>'+
      '<td class="name-col">'+p.n+'<br><span class="badge" style="background:'+cor+'18;color:'+cor+';margin-top:2px;display:inline-block">'+p.s+'</span></td>'+
      '<td class="r"><input type="number" id="'+mes+'_peers_'+i+'" min="0" max="99" value="'+(r.peers||0)+'" '+dis+'></td>'+
      '<td class="r"><input type="number" id="'+mes+'_ger_'+i+'" min="0" max="10" value="'+(r.ger||0)+'" '+dis+'></td>'+
      '<td class="r"><input type="number" id="'+mes+'_pont_'+i+'" min="0" max="2" value="'+(r.pont||0)+'" '+dis+'></td>'+
      '<td class="sub-col" id="'+mes+'_sub_'+i+'">–</td></tr>';
  }
  html+='</tbody></table></div>';
  if (isEditor&&!isDone) html+='<button class="btn-concluir" onclick="showModal(\''+mes+'\')">🏆 Concluir '+label+'</button>';
  return html;
}

function bindMes(mes) {
  for (var i=0;i<PESSOAS.length;i++) {
    (function(idx){
      var fields=['peers','ger','pont'];
      for (var fi=0;fi<fields.length;fi++) {
        (function(field){
          var el=document.getElementById(mes+'_'+field+'_'+idx);
          if(!el||el.disabled) return;
          el.addEventListener('input',function(){
            data[mes].rows[idx][field]=parseInt(el.value)||0;
            updateRows(mes);
            schedSave();
          });
        })(fields[fi]);
      }
    })(i);
  }
  updateRows(mes);
}

// ---- MODAL PÓDIO ----
function showModal(mes) {
  var sorted=getSortedSub(mes).filter(function(p){return p.sub>0;});
  if(!sorted.length){alert('Nenhum voto registrado.');return;}
  var top3=sorted.slice(0,3), bonuses=[3,2,1], medals=['🥇','🥈','🥉'], rows='';
  for(var i=0;i<top3.length;i++){
    rows+='<div class="modal-row"><span class="modal-medal">'+medals[i]+'</span>'+
      '<span class="modal-name">'+top3[i].n+'</span>'+
      '<span class="modal-pts">'+top3[i].sub+' pts</span>'+
      '<span class="modal-bonus">+'+bonuses[i]+' anual</span></div>';
  }
  document.getElementById('modal-container').innerHTML=
    '<div class="modal-overlay" onclick="if(event.target===this)hideLoading()">'+
    '<div class="modal"><h3>Confirmar pódio — '+LABEL[mes]+'</h3>'+
    '<div class="modal-sub">Os bônus são somados <strong>apenas no ranking anual</strong>.</div>'+
    rows+(sorted.length>3?'<p style="font-size:11px;color:var(--text-sub);margin-top:.5rem">Demais sem bônus neste mês.</p>':'')+
    '<div class="modal-actions">'+
    '<button class="btn-cancel" onclick="hideLoading()">Voltar e ajustar</button>'+
    '<button class="btn-confirm" onclick="confirmModal(\''+mes+'\')">Confirmar e fechar mês</button>'+
    '</div></div></div>';
}

function hideLoading() { document.getElementById('modal-container').innerHTML=''; }

function confirmModal(mes) {
  var sorted=getSortedSub(mes).filter(function(p){return p.sub>0;});
  data[mes].bonus={};
  for(var i=0;i<Math.min(sorted.length,3);i++) data[mes].bonus[sorted[i].i]=[3,2,1][i];
  data[mes].done=true;
  hideLoading(); updateAllTabs(); show(mes);
  saveToSupabase();
}

function reabrirMes(mes) {
  if(!confirm('Reabrir '+LABEL[mes]+'? Os bônus serão removidos.')) return;
  data[mes].done=false; data[mes].bonus={};
  updateAllTabs(); show(mes); schedSave();
}

// ---- ANUAL ----
function renderAnual() {
  var allSorted=[];
  for(var i=0;i<PESSOAS.length;i++){
    var subT=0,bonT=0;
    for(var mi=0;mi<MESES.length;mi++){subT+=calcSub(MESES[mi],i);bonT+=getBonus(MESES[mi],i);}
    if(subT+bonT>0) allSorted.push({p:PESSOAS[i],i:i,subTotal:subT,bonusTotal:bonT,total:subT+bonT});
  }
  allSorted.sort(function(a,b){return b.total-a.total;});
  var html='<div class="section-lbl">Pódio anual — 2026</div>';
  if(allSorted.length>=2){
    var order=allSorted.length>=3?[allSorted[1],allSorted[0],allSorted[2]]:[allSorted[1],allSorted[0]];
    var cls=['pos2','pos1','pos3'],nums=[2,1,3];
    html+='<div class="podium">';
    for(var oi=0;oi<order.length;oi++){
      var x=order[oi];
      html+='<div class="pod-item '+cls[oi]+'"><div class="pod-name">'+x.p.n+'</div><div class="pod-setor">'+x.p.s+'</div><div class="pod-pts">'+x.total+' pts</div><div class="pod-block">'+nums[oi]+'</div></div>';
    }
    html+='</div>';
  }
  html+='<div class="section-lbl">Ranking completo</div><div class="table-wrap"><table><thead><tr><th style="width:28px">#</th><th style="width:140px">Colaborador</th>';
  for(var mi2=0;mi2<MESES.length;mi2++) html+='<th class="r" style="width:38px;font-size:9px">'+LABEL[MESES[mi2]].slice(0,3)+'</th>';
  html+='<th class="r" style="width:58px">Bônus</th><th class="r" style="width:58px">Total</th></tr></thead><tbody>';
  for(var ri=0;ri<allSorted.length;ri++){
    var e=allSorted[ri],cor2=COR[e.p.s]||'#888';
    html+='<tr><td><span class="pos-badge">'+(ri+1)+'</span></td><td class="name-col">'+e.p.n+'<br><span class="badge" style="background:'+cor2+'18;color:'+cor2+';margin-top:2px;display:inline-block">'+e.p.s+'</span></td>';
    for(var mi3=0;mi3<MESES.length;mi3++){
      var sub=calcSub(MESES[mi3],e.i),bon=getBonus(MESES[mi3],e.i);
      var cell=sub>0?''+sub:'–';
      if(bon>0) cell+='<span style="color:#a05e00;font-size:10px"> +'+bon+'</span>';
      html+='<td style="text-align:right;color:var(--text-sub);font-family:\'DM Mono\',monospace;font-size:11px">'+cell+'</td>';
    }
    html+='<td style="text-align:right">'+(e.bonusTotal>0?'<span class="bonus-chip">+'+e.bonusTotal+'</span>':'–')+'</td><td class="anual-col">'+e.total+'</td></tr>';
  }
  html+='</tbody></table></div><p style="font-size:11px;color:var(--text-sub);margin-top:.75rem">Bônus mensal: 🥇 +3 · 🥈 +2 · 🥉 +1 — aplicados apenas no total anual.</p>';
  return html;
}

// ---- DASHBOARD ----
function renderDashboard() {
  if(!barMesSelecionado) barMesSelecionado=getMesAtual();
  var allAnual=[];
  for(var i=0;i<PESSOAS.length;i++){
    var subT=0,bonT=0;
    for(var mi=0;mi<MESES.length;mi++){subT+=calcSub(MESES[mi],i);bonT+=getBonus(MESES[mi],i);}
    if(subT+bonT>0) allAnual.push({p:PESSOAS[i],i:i,total:subT+bonT});
  }
  allAnual.sort(function(a,b){return b.total-a.total;});
  var max=allAnual.length?allAnual[0].total:1;
  var top10=allAnual.slice(0,10),resto=allAnual.slice(10);

  function rankRowsHtml(list){
    var h='';
    for(var ri=0;ri<list.length;ri++){
      var x=list[ri],rank=allAnual.indexOf(x),cor=COR[x.p.s]||'#888';
      var pct=Math.round((x.total/max)*100);
      var barCor=rank===0?'var(--gold)':rank===1?'var(--silver)':rank===2?'var(--bronze)':'var(--cyan)';
      h+='<div class="rank-row"><span class="rank-num">'+(rank+1)+'</span>'+
        '<span class="rank-name">'+x.p.n+'<br><span class="badge" style="background:'+cor+'18;color:'+cor+'">'+x.p.s+'</span></span>'+
        '<div class="rank-bar-wrap"><div class="rank-bar" style="width:'+pct+'%;background:'+barCor+'"></div></div>'+
        '<span class="rank-pts">'+x.total+'</span></div>';
    }
    return h;
  }

  var mesOpts='';
  for(var mi2=0;mi2<MESES.length;mi2++){
    mesOpts+='<option value="'+MESES[mi2]+'"'+(MESES[mi2]===barMesSelecionado?' selected':'')+'>'+LABEL[MESES[mi2]]+'</option>';
  }
  var pessoasOpts='';
  for(var pi=0;pi<PESSOAS.length;pi++){
    pessoasOpts+='<option value="'+pi+'">'+PESSOAS[pi].n+'</option>';
  }

  var html='<div class="dash-grid">';
  html+='<div class="dash-card"><div class="dash-card-title">🏆 Ranking anual — top 10</div>'+
    '<div id="rank-list">'+(top10.length?rankRowsHtml(top10):'<div class="dash-empty">Nenhum dado ainda. Preencha os meses.</div>')+'</div>';
  if(resto.length>0){
    html+='<div id="rank-resto" style="display:none">'+rankRowsHtml(resto)+'</div>'+
      '<button class="ver-todos-btn" id="ver-todos-btn" onclick="toggleVerTodos()">Ver todos ('+resto.length+' mais)</button>';
  }
  html+='</div>';
  html+='<div class="dash-card"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">'+
    '<div class="dash-card-title" style="margin-bottom:0">📊 Top 5 do mês</div>'+
    '<select class="mes-select" onchange="onBarMesChange(this.value)">'+mesOpts+'</select>'+
    '</div><div style="height:220px;position:relative"><canvas id="bar-chart"></canvas></div></div>';
  html+='<div class="dash-card full"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:.5rem">'+
    '<div class="dash-card-title" style="margin-bottom:0">📈 Evolução mensal acumulada</div>'+
    '<div style="display:flex;align-items:center;gap:8px">'+
    '<label style="font-size:11px;color:var(--text-sub);font-weight:500">Colaborador:</label>'+
    '<select class="mes-select" id="ev-select" onchange="drawEvChart()">'+
    '<option value="all" selected>Todos</option>'+pessoasOpts+
    '</select></div></div>'+
    '<div style="height:220px;position:relative"><canvas id="ev-chart"></canvas></div></div>';
  html+='</div>';
  return html;
}

function toggleVerTodos(){
  var el=document.getElementById('rank-resto'),btn=document.getElementById('ver-todos-btn');
  if(!el||!btn) return;
  var hidden=el.style.display==='none';
  el.style.display=hidden?'block':'none';
  btn.textContent=hidden?'Ocultar':'Ver todos ('+el.querySelectorAll('.rank-row').length+' mais)';
}

function onBarMesChange(mes){barMesSelecionado=mes;drawBarChart();}

function drawBarChart(){
  var canvas=document.getElementById('bar-chart');
  if(!canvas) return;
  var mes=barMesSelecionado||getMesAtual();
  var sorted=getSortedSub(mes).filter(function(p){return p.sub>0;}).slice(0,5);
  if(!sorted.length){
    canvas.style.display='none';
    var wrap=canvas.parentNode,ex=wrap.querySelector('.dash-empty');
    if(!ex){var msg=document.createElement('div');msg.className='dash-empty';msg.textContent='Nenhum voto neste mês.';wrap.appendChild(msg);}
    return;
  }
  canvas.style.display='block';
  var ex2=canvas.parentNode.querySelector('.dash-empty');if(ex2)ex2.remove();
  var labels=sorted.map(function(p){return PESSOAS[p.i].n.split(' ')[0];});
  var peersDat=sorted.map(function(p){return data[mes].rows[p.i].peers||0;});
  var gerDat=sorted.map(function(p){return data[mes].rows[p.i].ger||0;});
  var pontDat=sorted.map(function(p){return data[mes].rows[p.i].pont||0;});
  if(barChartInstance){barChartInstance.destroy();barChartInstance=null;}
  barChartInstance=new Chart(canvas,{type:'bar',
    data:{labels:labels,datasets:[
      {label:'Colegas',data:peersDat,backgroundColor:'#00B5E2cc',borderRadius:3},
      {label:'Gerência',data:gerDat,backgroundColor:'#2D2C65cc',borderRadius:3},
      {label:'Pontualidade',data:pontDat,backgroundColor:'#FD4B01cc',borderRadius:3}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'bottom',labels:{font:{family:'DM Sans',size:11},padding:10,boxWidth:12,boxHeight:12}},
        tooltip:{backgroundColor:'#0D1B35',bodyFont:{family:'DM Mono',size:11},padding:8,
          callbacks:{footer:function(items){return 'Total: '+items.reduce(function(s,it){return s+it.parsed.y;},0)+' pts';}}}},
      scales:{x:{stacked:true,grid:{display:false},ticks:{font:{family:'DM Sans',size:11},color:'#6B7A99'}},
        y:{stacked:true,beginAtZero:true,grid:{color:'#E4E7EF'},ticks:{font:{family:'DM Mono',size:10},color:'#6B7A99'}}}}
  });
}

function getEvSelecionados(){
  var sel=document.getElementById('ev-select');
  var all=[];for(var i=0;i<PESSOAS.length;i++) all.push(i);
  if(!sel) return all;
  if(sel.value==='all') return all;
  return [parseInt(sel.value)];
}

function drawEvChart(){
  var canvas=document.getElementById('ev-chart');
  if(!canvas) return;
  var selecionados=getEvSelecionados();
  var mesesAtivos=MESES.filter(function(m){
    for(var i=0;i<PESSOAS.length;i++){if(calcSub(m,i)>0)return true;}return false;
  });
  if(!mesesAtivos.length){
    canvas.style.display='none';
    var wrap=canvas.parentNode,ex=wrap.querySelector('.dash-empty');
    if(!ex){var msg=document.createElement('div');msg.className='dash-empty';msg.textContent='Nenhum dado ainda.';wrap.appendChild(msg);}
    return;
  }
  canvas.style.display='block';
  var ex2=canvas.parentNode.querySelector('.dash-empty');if(ex2)ex2.remove();
  var labels=mesesAtivos.map(function(m){return LABEL[m].slice(0,3);});
  var datasets=[];
  for(var si=0;si<selecionados.length;si++){
    var idx=selecionados[si],cor=LINHA_CORES[idx%LINHA_CORES.length],acc=0;
    datasets.push({label:PESSOAS[idx].n,
      data:mesesAtivos.map(function(m){acc+=calcSub(m,idx)+getBonus(m,idx);return acc;}),
      borderColor:cor,backgroundColor:cor+'18',borderWidth:2,pointRadius:4,pointHoverRadius:6,
      pointBackgroundColor:cor,tension:0.3,fill:false});
  }
  if(evChartInstance){evChartInstance.destroy();evChartInstance=null;}
  evChartInstance=new Chart(canvas,{type:'line',
    data:{labels:labels,datasets:datasets},
    options:{responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{legend:{position:'bottom',labels:{font:{family:'DM Sans',size:11},padding:12,boxWidth:12,boxHeight:12}},
        tooltip:{backgroundColor:'#0D1B35',titleFont:{family:'DM Sans',size:12},bodyFont:{family:'DM Mono',size:11},padding:10,
          callbacks:{label:function(ctx){return ' '+ctx.dataset.label+': '+ctx.parsed.y+' pts';}}}},
      scales:{x:{grid:{color:'#E4E7EF'},ticks:{font:{family:'DM Sans',size:11},color:'#6B7A99'}},
        y:{beginAtZero:true,grid:{color:'#E4E7EF'},ticks:{font:{family:'DM Mono',size:11},color:'#6B7A99'}}}}
  });
}

// ---- NAVEGAÇÃO ----
function updateAllTabs(){
  var tabs=document.querySelectorAll('.tab');
  for(var ti=0;ti<tabs.length;ti++){
    var t=tabs[ti].dataset.tab;
    if(t&&t!=='anual'&&t!=='dashboard') tabs[ti].classList.toggle('done',!!(data[t]&&data[t].done));
  }
}

function show(tab){
  currentTab=tab;
  var tabs=document.querySelectorAll('.tab');
  for(var ti=0;ti<tabs.length;ti++) tabs[ti].classList.toggle('active',tabs[ti].dataset.tab===tab);
  var content=document.getElementById('content');
  if(tab==='dashboard'){content.innerHTML=renderDashboard();drawBarChart();drawEvChart();}
  else if(tab==='anual'){content.innerHTML=renderAnual();}
  else{content.innerHTML=renderMes(tab);bindMes(tab);}
}

document.getElementById('tabs').addEventListener('click',function(e){
  if(e.target.dataset.tab) show(e.target.dataset.tab);
});

// ---- INIT ----
loadFromSupabase();
</script>
</body>
</html>
